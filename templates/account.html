<!DOCTYPE html>
<html>
<head>
<title>Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    color:white;
    background:
    linear-gradient(rgba(10,15,40,.85),rgba(10,15,40,.95)),
    url("https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920")
    center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:80px 15px 25px;
    box-sizing:border-box;
}

.card{
    width:100%;
    max-width:420px;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.15);
    overflow:hidden;
}

h2{
    margin-bottom:20px;
}

.info{
display:flex;
align-items:center;
gap:12px;
margin-bottom:14px;
font-size:14px;
}

.info div{
line-height:1.2;
}

.info b{
font-size:13px;
margin-bottom:2px;
}

.info svg{
    width:18px;
    height:18px;
    stroke:#d9e3ff;
    flex-shrink:0;
    margin-top:2px;
    opacity:0.9;
}

.info b{
    display:block;
    margin-bottom:2px;
    font-size:14px;
    color:#d8e6ff;
}

.edit-btn{
width:100%;
height:52px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
color:white;
font-size:16px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:14px;
cursor:pointer;
transition:.25s;
}

.edit-btn:hover{
background:rgba(255,255,255,.16);
}


.back-btn:hover{
    background:rgba(0,0,0,0.7);
}

.popup-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup{
    width:320px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.6),
        inset 0 0 15px rgba(255,255,255,0.05);
    text-align:center;
    animation: fadeIn 0.3s ease;
}

.popup h3{
    margin-bottom:15px;
    font-weight:600;
}

.popup input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
    transition:0.3s;
}

.popup input:focus{
    background:rgba(255,255,255,0.15);
    box-shadow:0 0 10px rgba(0,198,255,0.3);
}

.popup-buttons{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-top:15px;
}

.popup button{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.1);
    color:white;
    transition:0.3s;
}

.popup button:hover{
    background:rgba(255,255,255,0.2);
    transform:scale(1.03);
}

.popup .primary{
    background:linear-gradient(45deg,#6a5cff,#00c6ff);
}
.card-header{
    padding:22px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.15);
}

.card-header h2{
    margin:0;
    font-size:28px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
.section{
    margin:16px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
}

.section h3{
    margin-top:0;
    margin-bottom:18px;
}

#toast{
    position:fixed;
    top:30px;
    left:50%;
    transform:translateX(-50%) translateY(-20px);
    padding:12px 20px;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    color:white;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:0.4s ease;
    z-index:99999;
    border:1px solid rgba(255,255,255,0.15);
}

#toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

#toast.success{
    box-shadow:0 0 15px rgba(0,255,150,0.4);
}

#toast.error{
    box-shadow:0 0 15px rgba(255,80,80,0.4);
}
@media(max-width:600px){

.card{
    max-width:100%;
}

.card-header h2{
    font-size:18px;
    font-weight: 600;
}

.section{
    margin:12px;
}

.info{
    font-size:15px;
}

.edit-btn{
    font-size:16px;
}

.popup{
    width:90%;
    padding:20px;
}

}
.back-btn{
position:fixed;
top:18px;
left:18px;
width:44px;
height:44px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
}
</style>

</head>

<body>

<a href="/profile" class="back-btn">

<svg viewBox="0 0 24 24" width="22" height="22" stroke="#00c6ff" fill="none" stroke-width="2">
<path d="M15 18l-6-6 6-6"/>
</svg>

</a>

<div class="card">

<div class="card-header">
    <h2>Account Profile & Security</h2>
</div>

<div class="section">
<h3>Personal Information</h3>
<div class="info">
    <svg viewBox="0 0 24 24" width="22" height="22" stroke="white" fill="none" stroke-width="2">
        <path d="M20 21a8 8 0 0 0-16 0"/>
        <circle cx="12" cy="8" r="4"/>
    </svg>

    <div>
        <b>Username</b><br>
        {{ user.username }}
    </div>
</div>
<div class="info">
    <svg viewBox="0 0 24 24" width="22" height="22" stroke="white" fill="none" stroke-width="2">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <polyline points="3,7 12,13 21,7"/>
    </svg>

    <div>
        <b>Email</b><br>
        {{ user.email }}
    </div>
</div>
<div class="info">
    <svg viewBox="0 0 24 24" width="22" height="22" stroke="white" fill="none" stroke-width="2">
        <rect x="7" y="2" width="10" height="20" rx="2"/>
        <circle cx="12" cy="18" r="1"/>
    </svg>

    <div>
        <b>Mobile</b><br>
        {{ user.mobile }}
    </div>
</div>
</div>

<div class="section">

<h3>Security &amp; Actions</h3>

<a href="/edit_profile">
<button class="edit-btn">

<svg viewBox="0 0 24 24" width="18" height="18" stroke="white" fill="none" stroke-width="2">
<path d="M12 20h9"/>
<path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/>
</svg>

<span>Edit Profile</span>

</button>
</a>

<button class="edit-btn" onclick="openConfirm()">

<svg viewBox="0 0 24 24" width="18" height="18" stroke="white" fill="none" stroke-width="2">
<rect x="5" y="11" width="14" height="10" rx="2"/>
<path d="M8 11V8a4 4 0 118 0v3"/>
</svg>

<span>Change Password</span>

</button>

</div>

</div>
<div id="confirmBox" class="popup-overlay" style="display:none;">
    <div class="popup">
        <h3>Change Password?</h3>
        <p style="opacity:0.7;">This will update your login credentials</p>

        <div class="popup-buttons">
            <button onclick="closeConfirm()">Cancel</button>
            <button class="primary" onclick="openPasswordForm()">Continue</button>
        </div>
    </div>
</div>
<div id="passwordBox" class="popup-overlay" style="display:none;">
    <div class="popup">

        <h3>Change Password</h3>

        <input type="password" id="oldPass" placeholder="Old Password">
        <div id="newPassFields" style="display:none;">
            <input type="password" id="newPass" placeholder="New Password">
            <input type="password" id="confirmPass" placeholder="Confirm Password">
        </div>

        <div class="popup-buttons">
            <button onclick="closePasswordForm()">Cancel</button>
            <button class="primary" onclick="updatePassword()">Update</button>
        </div>

    </div>
</div>
<div id="toast"></div>

<script>
function openConfirm(){
    document.getElementById("confirmBox").style.display = "flex";
}

function closeConfirm(){
    document.getElementById("confirmBox").style.display = "none";
}

function openPasswordForm(){
    closeConfirm();
    document.getElementById("passwordBox").style.display = "flex";
}

function closePasswordForm(){
    document.getElementById("passwordBox").style.display = "none";
}

function updatePassword(){

    const oldPass = document.getElementById("oldPass").value;
    const newPass = document.getElementById("newPass").value;
    const confirmPass = document.getElementById("confirmPass").value;

    // STEP 1 → verify old password first
    if(!document.getElementById("newPassFields").style.display || 
       document.getElementById("newPassFields").style.display === "none"){

        if(!oldPass){
            showToast("Enter old password", "error");
            return;
        }

        fetch("/verify_old_password", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ old_password: oldPass })
        })
        .then(res => res.json())
        .then(data => {

            if(data.status === "wrong_old"){
                showToast("Old password is incorrect", "error");
            }
            else if(data.status === "correct"){
                showToast("Verified ✓", "success");
                document.getElementById("newPassFields").style.display = "block";
            }
            else{
                showToast("Error", "error");
            }

        });

        return;
    }

    // STEP 2 → update password
    if(!newPass || !confirmPass){
        showToast("Fill all fields", "error");
        return;
    }

    if(newPass !== confirmPass){
        showToast("Passwords do not match", "error");
        return;
    }

    fetch("/change_password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            old_password: oldPass,
            new_password: newPass
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){
            showToast("Password updated", "success");
            closePasswordForm();
        } else {
            showToast("Error updating password", "error");
        }

    });
}
  

function showToast(message, type="success"){

    const toast = document.getElementById("toast");

    toast.innerText = message;
    toast.className = ""; // reset

    toast.classList.add("show", type);

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

</script>
</body>
</html>
