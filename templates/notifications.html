<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:url('https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920') no-repeat center/cover;
min-height: 100vh;
color:white;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
min-height:100%;
background:rgba(10,15,40,0.85);
z-index:-1;
}

.topbar{
position:fixed;
top:0;
height: 72px;
padding:0 18px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
z-index:1000;
}

.back{
color:#00c6ff;
cursor:pointer;
font-size:22px;
font-weight: 600;
}

.container{
padding-top:90px 18px 25px;
min-height:100vh;
width:100%;
max-width:650px;
margin:auto;
box-sizing: border-box;
text-align:center;
}

h2{
    font-size: 32px;
    font-weight: 700;
    text-align: left;
    margin-bottom:28px;
}

.card{
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(255,255,255,.08);
backdrop-filter:blur(22px);
padding:18px;
border-radius:20px;
margin-bottom:16px;
box-shadow:0 10px 25px rgba(0,0,0,.35);
transition:.3s;
}

.card:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.14);
}

.unread{
border-left:6px solid #00c6ff;
background: rgba(0,198,255,.08);
}

.msg{
font-size:22px;
font-weight:600;
line-height: 1.5;
}

.time{
font-size:14px;
opacity:0.65;
margin-top:8px;
}

.empty{
opacity:0.7;
margin-top:50px;
}

.close-btn {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.close-btn:hover {
    background: rgba(255,255,255,0.1);
}

@media(max-width:768px){

.container{
padding:90px 16px 30px;
}

h2{
font-size:28px;
}

.card{
padding:18px;
border-radius:18px;
}

.msg{
font-size:17px;
}

.time{
font-size:13px;
}

.topbar{
height:70px;
}

.back{
font-size:20px;
}

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="topbar">

<span class="back" onclick="history.back()">← Back</span>

<div onclick="clearAll()" style="cursor:pointer;">
    <svg viewBox="0 0 24 24" width="30" height="30" stroke="white" fill="none" stroke-width="2">
        <path d="M3 6h18"/>
        <path d="M8 6V4h8v2"/>
        <path d="M6 6l1 14h10l1-14"/>
    </svg>
</div>

</div>

<div class="container">

<h2>Notifications</h2>

{% if notifications %}
    {% for n in notifications %}
    
    <div class="card {% if not n.is_read %}unread{% endif %}" 
         onclick="handleClick('{{ n.id }}', '{{ n.type }}', '{{ n.property_id }}')">

        <div style="display:flex; justify-content:space-between; align-items:center;">

            <div style="display:flex; align-items: flex-start;gap: 14px;flex: 1;">
                
                <div class="msg">
                    {{ n.message }}
                </div>
                
                <div class="time">
                    {{ n.created_at.strftime("%d-%m-%Y %I:%M %p") if n.created_at else "" }}
                </div>

            </div>

            <div onclick="deleteNotification(event, '{{ n.id }}')" style="
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;
background:rgba(255,255,255,.05);
margin-left:10px;
">
                <svg viewBox="0 0 24 24" width="28" height="28" stroke="white" fill="none" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </div>

        </div>

    </div>

    {% endfor %}
{% else %}
    <p class="empty">Nothing here</p>
{% endif %}

</div>

<script>

function handleClick(id, type, propertyId){

    fetch(`/read_notification/${id}`);

    if(type === "visit_request"){
        window.location.href = "/visit_requests";
    }

    else if(type === "message"){
        window.location.href = "/inbox";
    }

    else if(type === "property"){
        if(propertyId && propertyId !== "None"){
            window.location.href = "/view/" + propertyId;
        } else {
            window.location.href = "/home";  // fallback
        }
    }

    else if(type === "view"){
        if(propertyId && propertyId !== "None"){
            window.location.href = "/view/" + propertyId;
        } else {
            window.location.href = "/home";
        }
    }
    
    else if(type === "report"){
    window.location.href = "/admin";
}

}

function openNotification(type, property_id){

    if(type === "message"){
        window.location.href = "/inbox";
    }
    else if(type === "visit_request"){
        window.location.href = "/visit_requests";
    }
    else if(type === "property"){
        window.location.href = "/view/" + property_id;
    }
    else if(type === "view"){
        window.location.href = "/view/" + property_id;
    }

}

function deleteNotification(event, id){

    event.stopPropagation();

    fetch(`/delete_notification/${id}`)
    .then(() => {
        event.target.closest(".card").remove();
    });
}

function clearAll(){
    window.location.href = "/clear_notifications";
}

</script>

</body>
</html>
