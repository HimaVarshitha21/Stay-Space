<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:url('https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920') no-repeat center/cover;
min-height: 100vh;
color:white;
}

/* DARK OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
min-height:100%;
background:rgba(10,15,40,0.85);
z-index:-1;
}

/* TOP BAR */
.topbar{
position:fixed;
top:0;
width:100%;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
z-index:1000;
}

.back{
color:#00c6ff;
cursor:pointer;
font-size:18px;
}

/* MAIN */
.container{
padding-top:100px;
min-height:100vh;
width:90%;
max-width:500px;
margin:auto;
text-align:center;
}

/* TITLE */
h2{
margin-bottom:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
text-align:left;
transition:0.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.14);
}

/* UNREAD */
.unread{
border-left:4px solid #00c6ff;
}

/* CONTENT */
.msg{
font-size:14px;
font-weight:500;
}

.time{
font-size:11px;
opacity:0.6;
margin-top:5px;
}

/* EMPTY */
.empty{
opacity:0.7;
margin-top:50px;
}

.close-btn {
    width: 30px;
    height: 30px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 50%;
    cursor: pointer;

    transition: 0.2s;
}

.close-btn:hover {
    background: rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- TOP BAR -->
<div class="topbar">

<span class="back" onclick="history.back()">← Back</span>

<!-- CLEAR ALL -->
<div onclick="clearAll()" style="cursor:pointer;">
    <svg viewBox="0 0 24 24" width="20" height="20" stroke="white" fill="none" stroke-width="2">
        <path d="M3 6h18"/>
        <path d="M8 6V4h8v2"/>
        <path d="M6 6l1 14h10l1-14"/>
    </svg>
</div>

</div>

<!-- CONTENT -->
<div class="container">

<h2>Notifications</h2>

{% if notifications %}
    {% for n in notifications %}
    
    <div class="card {% if not n.is_read %}unread{% endif %}" 
         onclick="handleClick('{{ n.id }}', '{{ n.type }}', '{{ n.property_id }}')">

        <div style="display:flex; justify-content:space-between; align-items:center;">

            <!-- TEXT -->
            <div style="flex:1;">
                
                <div class="msg">
                    {{ n.message }}
                </div>
                
                <div class="time">
                    {{ n.created_at.strftime("%d-%m-%Y %I:%M %p") if n.created_at else "" }}
                </div>

            </div>

            <!-- DELETE -->
            <div onclick="deleteNotification(event, '{{ n.id }}')" style="margin-left:10px; cursor:pointer;">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="white" fill="none" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </div>

        </div>

    </div>

    {% endfor %}
{% else %}
    <p class="empty">Nothing here</p>
{% endif %}

</div>

<script>

// CLICK NOTIFICATION
function handleClick(id, type, propertyId){

    // mark as read
    fetch(`/read_notification/${id}`);

    // 🔥 VISIT REQUEST CLICK
    if(type === "visit_request"){
        window.location.href = "/visit_requests";
    }

    // 💬 MESSAGE CLICK
    else if(type === "message"){
        window.location.href = "/inbox";
    }

    // 🏠 PROPERTY SAVED CLICK
    else if(type === "property"){
        if(propertyId && propertyId !== "None"){
            window.location.href = "/view/" + propertyId;
        } else {
            window.location.href = "/home";  // fallback
        }
    }

    // 👁 VIEW CLICK
    else if(type === "view"){
        if(propertyId && propertyId !== "None"){
            window.location.href = "/view/" + propertyId;
        } else {
            window.location.href = "/home";
        }
    }
    
    else if(type === "report"){
    window.location.href = "/admin";
}

}


// REDIRECT LOGIC
function openNotification(type, property_id){

    if(type === "message"){
        window.location.href = "/inbox";
    }
    else if(type === "visit_request"){
        window.location.href = "/visit_requests";
    }
    else if(type === "property"){
        window.location.href = "/view/" + property_id;
    }
    else if(type === "view"){
        window.location.href = "/view/" + property_id;
    }

}

// DELETE
function deleteNotification(event, id){

    event.stopPropagation();

    fetch(`/delete_notification/${id}`)
    .then(() => {
        event.target.closest(".card").remove();
    });
}

// CLEAR ALL
function clearAll(){
    window.location.href = "/clear_notifications";
}

</script>

</body>
</html>
