<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StaySpace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI', sans-serif;
min-height:100vh;
scroll-behavior:smooth;
background:
linear-gradient(rgba(10,15,40,0.75), rgba(10,15,40,0.90)),
url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920')
no-repeat center center/cover;

color:white;
}

.hero{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

width:100%;
max-width:1100px;

margin:auto;

min-height:100vh;
}

.logo{
font-size:52px;
font-weight:700;
margin-bottom:10px;
background: linear-gradient(45deg,#6a5cff,#00c6ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
font-size:20px;
opacity:0.95;
margin-bottom:30px;
max-width:500px;
}

.features{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:18px;
max-width:900px;
margin:35px auto;
}

.feature{

display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:250px;
height:78px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.35);
font-size:18px;
font-weight:600;
transition:.3s;
padding:0 18px;
}

.feature:hover{
transform:translateY(-5px);
background:rgba(255,255,255,.18);
box-shadow:0 15px 30px rgba(0,0,0,.4);
}

.feature svg{
width:28px;
height:28px;
flex-shrink:0;
stroke:#00c6ff;
}

.feature span{
line-height:1.5;
}

.btn{
padding:16px 34px;
margin:10px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:18px;
font-weight:600;
transition:all .3s ease;
min-width:180px;
text-decoration:none;
display:inline-block;
}

.primary{
background: linear-gradient(45deg,#6a5cff,#00c6ff);
color:white;
}

.secondary{
background: rgba(255,255,255,0.85);
color:#333;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,.35);
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

.hero{
padding:25px;
height:auto;
min-height:100vh;
}

.logo{
font-size:42px;
}

.tagline{
font-size:17px;
margin-bottom:25px;
}

.features{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.feature{
width:145px;
height:58px;
font-size:12px;
padding:8px;
gap:6px;
}

.btn{
display:block;
width:100%;
max-width:350px;
margin:12px auto;
font-size:18px;
}

.buttons{
flex-direction:column;
align-items:center;
}
}

@media(max-width:430px){

.logo{
font-size:36px;
}

.tagline{
font-size:15px;
}

.feature{
width:135px;
height:55px;
font-size:11px;
padding:6px;
}

.btn{
font-size:17px;
padding:15px;
}
}

</style>
</head>

<body>

<div class="hero">

<div class="logo">StaySpace</div>

<div class="tagline">
Find • Post • Connect — Your Property Journey Starts Here
</div>

<div class="features">

<div class="feature">

<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
stroke="currentColor" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round"
d="M3 10.5L12 3l9 7.5M5 9v12h14V9M9 21v-6h6v6"/>
</svg>

<span>Buy & Sell Properties Easily</span>

</div>


<div class="feature">

<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
stroke="currentColor" stroke-width="2">

<rect x="3" y="3" width="18" height="18" rx="2"/>

<circle cx="8" cy="8" r="1.5"/>

<path d="M21 15l-5-5L5 21"/>

</svg>

<span>Post Listings in Minutes</span>

</div>


<div class="feature">

<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
stroke="currentColor" stroke-width="2">

<path d="M12 2L4 5v6c0 5 3.5 9.5 8 11c4.5-1.5 8-6 8-11V5l-8-3z"/>

<path d="M9 12l2 2l4-4"/>

</svg>

<span>Verified Owners & Listings</span>

</div>


<div class="feature">

<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
stroke="currentColor" stroke-width="2">

<path d="M12 21s7-6 7-12a7 7 0 10-14 0c0 6 7 12 7 12z"/>

<circle cx="12" cy="9" r="2"/>

</svg>

<span>Find Nearby Homes Instantly</span>

</div>

</div>


<div class="buttons">

    <a href="/signup" class="btn primary">
        Get Started
    </a>

    <a href="/login" class="btn secondary">
        Login
    </a>

</div>

</div>

</body>
</html>
