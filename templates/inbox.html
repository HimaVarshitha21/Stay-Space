<!DOCTYPE html>
<html>
<head>
<title>Inbox</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:url('https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920') center/cover no-repeat;
    color:white;
}

/* DARK OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(10,15,40,0.85);
z-index:-1;
}

/* TOP BAR */
.topbar{
    height:70px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    background:rgba(15,18,35,.85);
    backdrop-filter:blur(20px);

    border-bottom:1px solid rgba(255,255,255,.08);
}

.title{
    flex:1;
    text-align:center;

    font-size:18px;
    font-weight:600;
}

/* BACK BUTTON */

.back{
    width:55px;

    color:#1c6e85;
    text-decoration:none;

    font-size:17px;

    display:flex;
    align-items:center;
}

/* MAIN CONTAINER */
.container{
    width:100%;
    max-width:420px;
    height:700px;

    display:flex;
    flex-direction:column;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);

    border-radius:25px;
    overflow:hidden;

    box-shadow:0 20px 45px rgba(0,0,0,.45);

    margin:0;
}

/* CHAT LIST BOX */
.chat-list{
    flex:1;

    overflow-y:auto;

    padding:16px;

    display:flex;
    flex-direction:column;

    gap:14px;
}

/* CHAT CARD */
.chat-card{
    display:flex;
    align-items:center;
    gap:14px;

    padding:14px;

    border-radius:18px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);

    cursor:pointer;

    transition:.25s;
}

.chat-card:hover{
    background:rgba(255,255,255,.12);
    transform:translateY(-2px);
}


/* PROFILE CIRCLE */
.avatar{
width:45px;
height:45px;
border-radius:50%;
background: linear-gradient(45deg,#6a5cff,#00c6ff);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:16px;
}

/* TEXT AREA */
.chat-info{
flex:1;
display:flex;
flex-direction:column;
}

/* NAME + TIME */
.top-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.name{
font-weight:600;
font-size:15px;
}

.time{
font-size:12px;
opacity:0.7;
}

/* LAST MESSAGE */
.last-msg{
font-size:13px;
opacity:0.8;
margin-top:4px;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* EMPTY */
.empty{
text-align:center;
opacity:0.7;
margin-top:50px;
}

.header-space{
    width:55px;
}

@media(max-width:600px){

body{
    display:block;
}

.container{
    width:100%;
    max-width:none;
    height:100vh;

    margin:0;

    border-radius:0;
}

.topbar{
    height:60px;
}

.chat-list{
    padding:12px;
}

.chat-card{
    padding:12px;
}

.avatar{
    width:46px;
    height:46px;
    min-width:46px;
}

.name{
    font-size:15px;
}

.last-msg{
    font-size:13px;
}

.time{
    font-size:11px;
}
}
*{
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
}


.chat-list{
    width:100%;
}

.chat-card{
    width:100%;
}
</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="topbar">
        <a href="/home" class="back">← Back</a>
        <div class="title">Inbox</div>
        <div class="header-space"></div>
    </div>

    <div class="chat-list">


{% if conversations %}

{% for key, chat in conversations.items() %}

<div class="chat-card"
     onclick="openChat('{{ chat.name }}', '{{ chat.message.property_id }}')">

    <!-- Avatar -->
    <div class="avatar">
        {{ chat.name[0] }}
    </div>

    <!-- Info -->
    <div class="chat-info">

        <div class="top-row">
            <div class="name">{{ chat.name }}</div>

            <div class="time">
                {{ chat.message.time.strftime('%I:%M %p') }}
            </div>
        </div>

        <div class="last-msg">
            {{ chat.message.text }}
        </div>

    </div>

</div>

{% endfor %}

{% else %}
<p class="empty">No conversations yet</p>
{% endif %}

</div>
</div>

<script>
function openChat(user, property_id){
    window.location.href = "/chat/" + user+ "/" + property_id;
}
</script>

</body>
</html>
