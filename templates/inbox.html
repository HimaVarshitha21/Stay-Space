<!DOCTYPE html>
<html>
<head>
<title>Inbox</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920') center/cover no-repeat;
    color:white;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(10,15,40,0.85);
z-index:-1;
}

.topbar{
height:68px;
padding:0 18px;
display:flex;
align-items:center;
background:rgba(15,18,35,.92);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
z-index:100;
}

.title{
flex:1;
text-align:center;
font-size:26px;
font-weight:700;
letter-spacing:.5px;
}

.back{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,.08);
transition:.3s;
}

.back:hover{
background:rgba(0,198,255,.15);
}

.container{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
background:transparent;
border-radius:0;
backdrop-filter:none;
box-shadow:none;
}

.chat-list{
padding:18px;
display:flex;
flex-direction:column;
gap:14px;
overflow-y:auto;
}

.chat-card{
display:flex;
align-items:center;
gap:16px;
padding:16px;
border-radius:20px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(18px);
transition:.25s;
cursor:pointer;
}

.chat-card:hover{
background:rgba(255,255,255,.16);
transform:translateY(-2px);
}

.avatar{
width:58px;
height:58px;
border-radius:50%;
background:linear-gradient(135deg,#6a5cff,#00c6ff);
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:700;
color:white;
flex-shrink:0;
}

.chat-info{
flex:1;
display:flex;
flex-direction:column;
}

.top-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.name{
font-size:20px;
font-weight:600;
}

.time{
font-size:13px;
opacity:.7;
}

.last-msg{
margin-top:5px;
font-size:15px;
opacity:.8;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.empty{
text-align:center;
opacity:0.7;
margin-top:50px;
}

.header-space{
    width:55px;
}

@media(max-width:768px){

body{
    display:block;
}

.container{
    width:100%;
    max-width:none;
    height:100vh;

    margin:0;

    border-radius:0;
}

.topbar{
height:62px;
padding:0 14px;
}

.title{
font-size:22px;
}

.chat-list{
padding:12px;
gap:12px;
}

.chat-card{
padding:14px;
}

.avatar{
width:52px;
height:52px;
font-size:20px;

}

.name{
font-size:18px;
}

.last-msg{
font-size:14px;
}

.time{
    font-size:11px;
}
}
*{
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
}

.chat-list{
    width:100%;
}

.chat-card{
    width:100%;
}
</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="topbar">
        <a href="/home" class="back">

<svg xmlns="http://www.w3.org/2000/svg"
width="24"
height="24"
viewBox="0 0 24 24"
fill="none"
stroke="#00c6ff"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M15 18L9 12L15 6"/>

</svg>

</a>
        <div class="title">Inbox</div>
        <div style="width:42px;"></div>
    </div>

    <div class="chat-list">


{% if conversations %}

{% for key, chat in conversations.items() %}

<div class="chat-card"
     onclick="openChat('{{ chat.name }}')">

    <!-- Avatar -->
    <div class="avatar">
        {{ chat.name[0] }}
    </div>

    <!-- Info -->
    <div class="chat-info">

        <div class="top-row">
            <div class="name">{{ chat.name }}</div>

            <div class="time">
                {{ chat.message.time.strftime('%I:%M %p') }}
            </div>
        </div>

        <div class="last-msg">
            {{ chat.message.text }}
        </div>

    </div>

</div>

{% endfor %}

{% else %}
<p class="empty">No conversations yet</p>
{% endif %}

</div>
</div>

<script>
function openChat(user){
    window.location.href = "/chat/" + encodeURIComponent(user);
}
</script>

</body>
</html>
