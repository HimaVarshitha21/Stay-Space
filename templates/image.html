<!DOCTYPE html>
<html>
<head>
<title>Upload Property Photos</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* BACKGROUNDS */
.land-bg{
background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1920')
no-repeat center/cover;
}

.house-bg{
background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920')
no-repeat center/cover;
}

.hostel-bg{
background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1555854877-bab0e564b8d5?q=80&w=1920')
no-repeat center/cover;
}

.commercial-bg{
background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1920')
no-repeat center/cover;
}

/* CARD */
.card{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(25px);
padding:30px;
border-radius:28px;
text-align:center;
width:360px;
color:white;
}

/* INPUT */
input, select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:none;
background:white;
color:#222;
}

/* FILE INPUT FIX */
input[type="file"]{
padding:10px;
cursor:pointer;
}

/* IMAGE PREVIEW GRID */
.preview{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:10px;
margin-top:15px;
}

/* IMAGE STYLE */
.preview img{
width:100%;
height:80px;
object-fit:cover;
border-radius:10px;
border:2px solid rgba(255,255,255,0.3);
transition:0.3s;
}

.preview img:hover{
transform:scale(1.05);
}

/* BUTTONS */
.btns{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.back-btn{
background:white;
color:#333;
}

.next-btn{
background: linear-gradient(45deg,#6a5cff,#00c6ff);
color:white;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body class="{{ propertyType }}-bg">

<form method="POST" enctype="multipart/form-data">

<div class="card">

<h2>Upload Property Photos</h2>

<!-- ✅ MULTIPLE IMAGE INPUT -->
<input type="file" name="images" id="imageInput" accept="image/*" multiple required>

<!-- ✅ PREVIEW -->
<div class="preview" id="preview"></div>

<!-- ✅ HOUSE ONLY -->
{% if propertyType == "house" %}
<select name="furnishing">
<option value="">Select Furnishing</option>
<option>Fully Furnished</option>
<option>Semi Furnished</option>
<option>Unfurnished</option>
</select>
{% endif %}

<!-- ✅ OWNER DETAILS -->
<h3>Owner Details</h3>

<input type="text" name="owner_name" placeholder="Owner Name" required>
<input type="text" name="owner_mobile" placeholder="Mobile Number" required>

<!-- BUTTONS -->
<div class="btns">

<button type="button" class="back-btn" onclick="goBack()">
Back
</button>

<button type="submit" class="next-btn">
Submit
</button>

</div>

</div>

</form>

<script>

const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

let selectedFiles = [];

/* 🔥 MULTI IMAGE WITH REMOVE + LIMIT */
input.addEventListener("change", function(){

    const files = Array.from(this.files);

    // limit check
    if(selectedFiles.length + files.length > 6){
        alert("Maximum 6 images allowed");
        return;
    }

    files.forEach(file => {
        
        if(!file.type.startsWith("image/")) return;
        
        selectedFiles.push(file);
    });
    
    /* 🔥 ADD THIS LINE */
    updateInputFiles();
    
    renderPreview();
});


function renderPreview(){

    preview.innerHTML = "";

    selectedFiles.forEach((file, index) => {

        const reader = new FileReader();

        reader.onload = function(e){

            const wrapper = document.createElement("div");
            wrapper.style.position = "relative";

            const img = document.createElement("img");
            img.src = e.target.result;

            // ❌ remove button
            const removeBtn = document.createElement("span");
            removeBtn.innerHTML = "✖";
            removeBtn.style.position = "absolute";
            removeBtn.style.top = "4px";
            removeBtn.style.right = "6px";
            removeBtn.style.background = "rgba(0,0,0,0.6)";
            removeBtn.style.color = "white";
            removeBtn.style.fontSize = "12px";
            removeBtn.style.padding = "2px 6px";
            removeBtn.style.borderRadius = "50%";
            removeBtn.style.cursor = "pointer";

            removeBtn.onclick = function(){
                selectedFiles.splice(index, 1);
                updateInputFiles();
                renderPreview();
            };

            wrapper.appendChild(img);
            wrapper.appendChild(removeBtn);
            preview.appendChild(wrapper);
        };

        reader.readAsDataURL(file);
    });

}

/* 🔥 KEEP INPUT FILES IN SYNC */
function updateInputFiles(){

    const dt = new DataTransfer();

    selectedFiles.forEach(file => dt.items.add(file));

    input.files = dt.files;
}

/* BACK */
function goBack(){
    window.location.href="/details";
}

</script>

</body>
</html>
