<!DOCTYPE html>
<html>
<head>
<title>Upload Property Photos</title>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    color:white;
    padding:20px;
    box-sizing:border-box;
}

.land-bg{
background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1920')
no-repeat center/cover;
}

.house-bg{
background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920')
no-repeat center/cover;
}

.hostel-bg{
background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1555854877-bab0e564b8d5?q=80&w=1920')
no-repeat center/cover;
}

.commercial-bg{
background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1920')
no-repeat center/cover;
}

.card{
    width:100%;
    max-width:480px;
    min-height:92vh;
    padding:38px 30px;
    border-radius:32px;
    background:rgba(25,32,60,.45);
    backdrop-filter:blur(28px);
    -webkit-backdrop-filter:blur(28px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:
    0 25px 60px rgba(0,0,0,.45);
    display:flex;
    flex-direction:column;
    justify-content:center;
    box-sizing:border-box;
}

input[type="file"]{
    display:none;
}

input{
width:100%;
height:58px;
padding:0 18px;
margin-bottom:18px;
border-radius:16px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
outline:none;
box-sizing:border-box;
}

input::placeholder{
color:rgba(255,255,255,.65);
}

input:focus{
border-color:#72dfff;
box-shadow:0 0 10px rgba(114,223,255,.15);
}
button{
flex: 1;
height:70px;
border-radius:18px;
font-size:22px;
font-weight:700;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.08);
color:white;
transition:.3s;
}

button:hover{
background:rgba(255,255,255,.14);
}

.preview{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(110px,1fr));
gap:14px;
margin-bottom:25px;
}

.preview img{
width:100%;
height:80px;
object-fit:cover;
border-radius:10px;
border:2px solid rgba(255,255,255,0.3);
transition:0.3s;
}

.preview img:hover{
transform:scale(1.05);
}
.section-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:30px;
    font-weight:700;
    color:#72dfff;
    margin:20px 0 22px;
    padding-bottom:16px;
    border-bottom:1px solid rgba(255,255,255,.12);
}
form{
    width: 100%;
    max-width: 650px;
    margin: auto;
    display: block;
}
.btns{
display:flex;
gap:18px;
margin-top:30px;
}

button:hover{
transform:scale(1.05);
}

.page-header{
text-align:center;
margin-bottom:30px;
}

.page-title{
    font-size:46px;
    font-weight:800;
    line-height:1.15;
    letter-spacing:.4px;
    margin-bottom:14px;
}

.subtitle{
    font-size:20px;
    line-height:1.7;
    color:rgba(255,255,255,.82);
    max-width:360px;
    margin:auto;
}

.upload-box{
    width:100%;
    min-height:280px;
    border-radius:30px;
    border:2px dashed rgba(255,255,255,.28);
    background:rgba(255,255,255,.07);
    margin:45px 0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:.35s;
}

.upload-box:hover{
background:rgba(255,255,255,.08);
border-color:#72dfff;
}

.upload-title{
    font-size:34px;
    font-weight:700;
    margin-top:20px;
}

.upload-text{
    font-size:20px;
    color:rgba(255,255,255,.78);
    margin-top:12px;
}
.upload-box svg{
    width: 72px;
    height: 72px;
}

</style>
</head>

<body class="{{ propertyType }}-bg">

<form method="POST" enctype="multipart/form-data">

<div class="card">

<div class="page-header">

<div class="page-title">
Upload Property Details
</div>

<div class="subtitle">
Upload property photos and owner information.
</div>

</div>
<div class="upload-box" onclick="document.getElementById('imageInput').click()">

<svg width="48"
height="48"
viewBox="0 0 24 24"
fill="none"
stroke="#72dfff"
stroke-width="2">

<path d="M12 5v14"/>

<path d="M5 12h14"/>

</svg>

<div class="upload-title">
Upload Photos
</div>

<div class="upload-text">
Tap to choose up to 6 images
</div>

</div>
<input type="file" name="images" id="imageInput" accept="image/*" multiple required>

<div class="preview" id="preview"></div>

<div class="section-title">

<svg width="22"
height="22"
viewBox="0 0 24 24"
fill="none"
stroke="#72dfff"
stroke-width="2">

<circle cx="12" cy="8" r="4"/>

<path d="M5 20c1.5-4 12.5-4 14 0"/>

</svg>

Owner Details

</div>

<input type="text" name="owner_name" placeholder="Owner Name" required>
<input type="text" name="owner_mobile" placeholder="Mobile Number" required>

<div class="btns">

<button type="button" class="button" onclick="goBack()">
Back
</button>

<button type="submit" class="button">
Submit
</button>
</div>
</div>
</form>

<script>

const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

let selectedFiles = [];

input.addEventListener("change", function(){

    const files = Array.from(this.files);

    if(selectedFiles.length + files.length > 6){
        alert("Maximum 6 images allowed");
        return;
    }

    files.forEach(file => {
        
        if(!file.type.startsWith("image/")) return;
        
        selectedFiles.push(file);
    });
    
    updateInputFiles();
    
    renderPreview();
});

function renderPreview(){

    preview.innerHTML = "";

    selectedFiles.forEach((file, index) => {

        const reader = new FileReader();

        reader.onload = function(e){

            const wrapper = document.createElement("div");
            wrapper.style.position = "relative";

            const img = document.createElement("img");
            img.src = e.target.result;

            const removeBtn = document.createElement("span");
            removeBtn.innerHTML = `
<svg width="14" height="14" viewBox="0 0 24 24"
fill="none"
stroke="white"
stroke-width="2">
<path d="M18 6L6 18"/>
<path d="M6 6L18 18"/>
</svg>`;
            removeBtn.style.position = "absolute";
            removeBtn.style.top = "4px";
            removeBtn.style.right = "6px";
            removeBtn.style.background = "rgba(0,0,0,0.6)";
            removeBtn.style.color = "white";
            removeBtn.style.fontSize = "12px";
            removeBtn.style.padding = "2px 6px";
            removeBtn.style.borderRadius = "50%";
            removeBtn.style.cursor = "pointer";

            removeBtn.onclick = function(){
                selectedFiles.splice(index, 1);
                updateInputFiles();
                renderPreview();
            };

            wrapper.appendChild(img);
            wrapper.appendChild(removeBtn);
            preview.appendChild(wrapper);
        };

        reader.readAsDataURL(file);
    });
}

function updateInputFiles(){

    const dt = new DataTransfer();

    selectedFiles.forEach(file => dt.items.add(file));

    input.files = dt.files;
}

function goBack(){
    window.location.href="/details";
}

</script>

</body>
</html>
