<!DOCTYPE html>
<html>
<head>
<title>Create Account - StaySpace</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(10,15,40,0.75), rgba(10,15,40,0.90)),
url('https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920')
no-repeat center center/cover;
}

.card{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(25px);
padding:40px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
width:340px;
color:white;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background: rgba(255,255,255,0.85);
color:#222;
font-size:15px;
outline:none;
}

.btn{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
background: linear-gradient(45deg,#6a5cff,#00c6ff);
color:white;
}

.error{
color:#ff6b6b;
margin-top:10px;
font-size:14px;
}

.success{
color:#00ffcc;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<form method="POST">

<div class="card">

<h3>Create Account</h3>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<input name="firstName" placeholder="First Name" required>
<input name="lastName" placeholder="Last Name" required>
<input name="mobile" placeholder="Mobile Number" required>
<input name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>
<input type="password" name="confirmPassword" placeholder="Confirm Password" required>

<button class="btn" type="submit">Create Account</button>

<p style="margin-top:10px;">
Already have account? <a href="/login" style="color:#00c6ff;">Login</a>
</p>

</div>

</form>

</body>
</html>
