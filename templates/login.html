<!DOCTYPE html>
<html>
<head>
<title>Login - StaySpace</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(10,15,40,0.75), rgba(10,15,40,0.90)),
url('https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920')
no-repeat center center/cover;
}

/* CARD */
.card{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(25px);
padding:45px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
width:340px;
color:white;
}

/* LOGO */
.logo{
font-size:36px;
font-weight:700;
margin-bottom:10px;
background: linear-gradient(45deg,#6a5cff,#00c6ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* INPUTS */
input{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background: rgba(255,255,255,0.85);
color:#222;
font-size:15px;
outline:none;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
font-size:15px;
background: linear-gradient(45deg,#6a5cff,#00c6ff);
color:white;
}

/* ERROR */
.error{
color:#ff6b6b;
margin-top:10px;
font-size:14px;
}

/* LINK */
.link{
margin-top:15px;
display:block;
color:#eee;
font-size:14px;
text-decoration:none;
}

.link:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<form method="POST">

<div class="card">

<div class="logo">StaySpace</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<!-- SAME FIELD -->
<input type="text" name="loginId" placeholder="Enter Email or Mobile" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button class="btn" type="submit">Login</button>

<a href="#" class="link">Forgot Password?</a>

<a href="/signup" class="link">New user? Create account</a>

</div>

</form>

</body>
</html>
