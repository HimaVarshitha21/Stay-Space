<!DOCTYPE html>
<html>
<head>
<title>Search</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
min-height:100vh;

background:
linear-gradient(rgba(10,15,40,.78),rgba(10,15,40,.88)),
url('https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920')
center center/cover fixed;

color:white;
}

.overlay{
position:fixed;
inset:0;
background:rgba(10,15,40,.30);
backdrop-filter:blur(10px);
z-index:-1;
}

/* TOP BAR */
.topbar{
display:flex;
align-items:center;
gap:16px;
padding:22px;
position:sticky;
top:0;
background:rgba(15,18,30,.75);
backdrop-filter:blur(18px);
z-index:100;
}

/* BACK */
.back{
display:flex;
align-items:center;
justify-content:center;
width:48px;
height:48px;
border-radius:50%;
background:rgba(255,255,255,.08);
cursor:pointer;
transition:.25s;
}

.back:hover{
background:rgba(0,198,255,.2);
}

/* SEARCH BOX */
.search-container{
flex:1;
position:relative;
}

/* INPUT */
.search-input{

width:100%;

height:58px;

padding-left:55px;

padding-right:20px;

border:none;

outline:none;

border-radius:35px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

font-size:17px;

color:white;

box-sizing:border-box;

}

/* ICON */
.search-icon{

position:absolute;

left:20px;

top:50%;

transform:translateY(-50%);

opacity:.9;

}

/* RESULTS */
.results{

padding:25px;

display:flex;

flex-direction:column;

gap:16px;

}

.result-card{

display:flex;

align-items:center;

gap:18px;

padding:18px;

border-radius:20px;

background:rgba(255,255,255,.10);

backdrop-filter:blur(18px);

cursor:pointer;

transition:.25s;

box-shadow:0 8px 20px rgba(0,0,0,.25);

}

.result-card:hover{

transform:translateY(-4px);

background:rgba(255,255,255,.15);

}

@media(max-width:768px){

.topbar{

padding:15px;

gap:10px;

}

.back{

width:42px;

height:42px;

}

.search-input{

height:50px;

font-size:15px;

padding-left:48px;

}

.results{

padding:15px;

}

.result-card{

padding:15px;

font-size:15px;

}

}

</style>
</head>

<body>

    <div class="overlay"></div>

<div class="topbar">

<span class="back" onclick<div class="back" onclick="history.back()">

<svg xmlns="http://www.w3.org/2000/svg"

width="24"

height="24"

viewBox="0 0 24 24"

fill="none"

stroke="#00c6ff"

stroke-width="2.5"

stroke-linecap="round"

stroke-linejoin="round">

<path d="M15 18l-6-6 6-6"/>

</svg>

</div>

<div class="search-container">

<input type="text" id="searchInput" class="search-input"
placeholder="Search users or properties..."
onkeyup="searchData()">

<svg class="search-icon" width="18" height="18" stroke="white" fill="none" stroke-width="2" viewBox="0 0 24 24">
<circle cx="11" cy="11" r="8"/>
<line x1="21" y1="21" x2="16.65" y2="16.65"/>
</svg>

</div>

</div>

<div id="results" class="results"></div>

<script>

function searchData(){
    let q = document.getElementById("searchInput").value;

    if(q.length === 0){
        document.getElementById("results").innerHTML = "";
        return;
    }

    fetch("/search?q=" + q)
    .then(res => res.json())
    .then(data => {

        let html = "";

        // USERS
        // USERS
data.users.forEach(u=>{
    html += `
    <div class="result-card" onclick="openUser('${u.username}')">
        
        <div style="display:flex; align-items:center; gap:10px;">
            
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2">
                <path d="M20 21a8 8 0 10-16 0"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>

            ${u.username}
        </div>

    </div>`;
});


// PROPERTIES
data.properties.forEach(p=>{
    html += `
    <div class="result-card" onclick="openProperty(${p.id})">

        <div style="display:flex; align-items:center; gap:10px;">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00c6ff" stroke-width="2">
                <path d="M3 10L12 3l9 7"/>
                <path d="M5 10v10h14V10"/>
                <path d="M9 21v-6h6v6"/>
            </svg>

            ${p.title}
        </div>

    </div>`;
});

        if(html === ""){
            html = "<div style='opacity:0.6'>No results found</div>";
        }

        document.getElementById("results").innerHTML = html;
    });
}

function openUser(username){
    window.location.href = "/user_profile/" + username;
}

function openProperty(id){
    window.location.href = "/view/" + id;
}

</script>

</body>
</html>
