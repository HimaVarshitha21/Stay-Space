<!DOCTYPE html>
<html>
<head>
<title>Search</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
min-height:100vh;

background:
linear-gradient(rgba(10,15,40,.78),rgba(10,15,40,.88)),
url('https://images.unsplash.com/photo-1493809842364-78817add7ffb?q=80&w=1920')
center center/cover fixed;

color:white;
}

.overlay{
position:fixed;
inset:0;
background:rgba(10,15,40,.30);
backdrop-filter:blur(10px);
z-index:-1;
}

.topbar{
position:sticky;
top:0;
display:flex;
align-items:center;
gap:12px;
padding:14px 16px;
background:rgba(15,18,30,.82);
backdrop-filter:blur(22px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:1000;
}

.back{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.08);
cursor:pointer;
transition:.25s;
flex-shrink:0;
}

.back:hover{
background:rgba(0,198,255,.18);
}

.search-container{
flex:1;
position:relative;
}

.search-input{
width:100%;
height:52px;
padding:0 18px 0 48px;
border:none;
outline:none;
border-radius:28px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(18px);
font-size:15px;
color:white;
box-sizing:border-box;
}

.search-input::placeholder{
color:#bfc4d5;
}

.search-icon{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
opacity:.8;
pointer-events:none;
}


.results{
padding:25px;
display:flex;
flex-direction:column;
gap:16px;
}

.result-card{
display:flex;
align-items:center;
gap:18px;
padding:18px;
border-radius:20px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(18px);
cursor:pointer;
transition:.25s;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.result-card:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.15);
}

@media(max-width:768px){

.topbar{
padding:12px;
gap:10px;
}

.back{
width:38px;
height:38px;
}

.search-input{
height:48px;
font-size:14px;
padding-left:44px;
}

.search-icon{
left:14px;
width:18px;
height:18px;
}

.result-card{
padding:15px;
font-size:15px;
}
}

</style>
</head>

<body>

    <div class="overlay"></div>

<div class="topbar">

    <div class="back" onclick="history.back()">

        <svg xmlns="http://www.w3.org/2000/svg"
             width="22"
             height="22"
             viewBox="0 0 24 24"
             fill="none"
             stroke="#00c6ff"
             stroke-width="2.5"
             stroke-linecap="round"
             stroke-linejoin="round">

            <path d="M15 18L9 12L15 6"/>

        </svg>

    </div>

    <div class="search-container">

        <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search users, properties, cities..."
        onkeyup="searchData()">

        <svg class="search-icon"
             xmlns="http://www.w3.org/2000/svg"
             width="20"
             height="20"
             viewBox="0 0 24 24"
             fill="none"
             stroke="white"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round">

            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20L16.65 16.65"></path>

        </svg>

    </div>

</div>

<div id="results" class="results"></div>

<script>

function searchData(){
    let q = document.getElementById("searchInput").value;

    if(q.length === 0){
        document.getElementById("results").innerHTML = "";
        return;
    }

    fetch("/search?q=" + q)
    .then(res => res.json())
    .then(data => {

        let html = "";
data.users.forEach(u=>{
    html += `
    <div class="result-card" onclick="openUser('${u.username}')">
        
        <div style="display:flex; align-items:center; gap:10px;">
            
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2">
                <path d="M20 21a8 8 0 10-16 0"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>

            ${u.username}
        </div>

    </div>`;
});

data.properties.forEach(p=>{
    html += `
    <div class="result-card" onclick="openProperty(${p.id})">

        <div style="display:flex; align-items:center; gap:10px;">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00c6ff" stroke-width="2">
                <path d="M3 10L12 3l9 7"/>
                <path d="M5 10v10h14V10"/>
                <path d="M9 21v-6h6v6"/>
            </svg>

            ${p.title}
        </div>

    </div>`;
});

        if(html === ""){
            html = "<div style='opacity:0.6'>No results found</div>";
        }

        document.getElementById("results").innerHTML = html;
    });
}

function openUser(username){
    window.location.href = "/user_profile/" + username;
}

function openProperty(id){
    window.location.href = "/view/" + id;
}

</script>

</body>
</html>
