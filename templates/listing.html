<!DOCTYPE html>
<html>
<head>
<title>Select Listing Type</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(10,15,40,0.78), rgba(10,15,40,0.88)),
url('https://images.unsplash.com/photo-1507089947368-19c1da9775ae?q=80&w=1920')
no-repeat center/cover;
}

/* CARD */
.card{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(25px);
padding:45px;
border-radius:24px;
box-shadow:0 25px 70px rgba(0,0,0,0.6);
text-align:center;
width:380px;
color:white;
position:relative;
}

/* BACK ICON */
.back-icon{
position:absolute;
top:18px;
left:18px;
cursor:pointer;
}

.back-icon svg{
width:22px;
height:22px;
stroke:white;
}

/* TITLE */
h2{
margin-bottom:25px;
}

/* BUTTON */
.option{
display:block;
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:600;
color:white;
background: linear-gradient(45deg,#6a5cff,#00c6ff);
transition:0.25s;
}

.option:hover{
transform:scale(1.05);
}

form{ margin:0; }

</style>
</head>

<body>

<div class="card">

<!-- 🔙 BACK ICON -->
<div class="back-icon" onclick="window.history.back()">
<svg viewBox="0 0 24 24" fill="none">
<path d="M15 18l-6-6 6-6" stroke-width="2"/>
</svg>
</div>

<h2>What are you listing?</h2>

<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="land">
<button class="option">Sell Land</button>
</form>

<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="house">
<button class="option">Sell House / Flat</button>
</form>

<form method="POST">
<input type="hidden" name="listingType" value="rent">
<input type="hidden" name="propertyType" value="house">
<button class="option">Rent House / Flat</button>
</form>

<form method="POST">
<input type="hidden" name="listingType" value="rent">
<input type="hidden" name="propertyType" value="hostel">
<button class="option">Hostel / PG</button>
</form>

<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="commercial">
<button class="option">Commercial Property</button>
</form>

</div>

</body>
</html>
