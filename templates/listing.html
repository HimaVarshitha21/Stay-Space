<!DOCTYPE html>
<html>
<head>
<title>Select Listing Type</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
background:
linear-gradient(rgba(15,20,45,.68),rgba(15,20,45,.82)),
url('https://images.unsplash.com/photo-1507089947368-19c1da9775ae?q=80&w=1920')
center center/cover no-repeat fixed;
color:white;
}

.card{
width:92%;
max-width:520px;
min-height:92vh;
margin:4vh auto;
padding:32px;
box-sizing:border-box;
position:relative;
border-radius:30px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(28px);
-webkit-backdrop-filter:blur(28px);
border:1px solid rgba(255,255,255,.18);
box-shadow:
0 10px 40px rgba(0,0,0,.35),
inset 0 1px 1px rgba(255,255,255,.12);
}
.back-icon{
position:absolute;
top:25px;
left:18px;
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
cursor:pointer;
}

.back-icon svg{
width:22px;
height:22px;
stroke:white;
}

h2{
margin-top:65px;
margin-bottom:12;
font-size:48px;
font-weight:800;
line-height:1.1;
letter-spacing:-1px;
text-shadow:0 6px 16px rgba(0,0,0,.45);
}

.subtitle{
font-size:18px;
color: rgba(255,255,255,.75);
line-height: 1.6;
margin-bottom:35px;
}

.property-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:25px;
}

.property-grid form{
margin:0;
}

.property-card{
width:100%;
height:220px;
border:none;
cursor:pointer;
border-radius:24px;
padding:20px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,.18);
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:flex-start;
transition:.3s;
color:white;
}

.property-card:hover{
transform:translateY(-6px);
border-color:#67d8ff;
box-shadow:0 18px 35px rgba(0,0,0,.35);
background:rgba(255,255,255,.14);
}
.property-card img{
width:92px;
height:92px;
object-fit:contain;
align-self:center;
margin-top:8px;
}

.property-card h3{
margin:0;
font-size:28px;
font-weight:700;
text-align:left;
line-height:1.2;
color:white;
}

.option{
width:100%;
height:92px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 26px;
margin: bottom 20px;
border-radius:24px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.09);
backdrop-filter:blur(22px);
color:white;
font-size:28px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

.option:hover{
background:rgba(255,255,255,.14);
border-color: #72dfff;
transform:translateY(-3px);
box-shadow: 0 14px 35px rgba(0,0,0,.35);
}

form{ margin:0; }

@media(max-width:600px){

.card{
padding:24px 16px 35px;
}

h2{
font-size:38px;
margin-top:68px;
}

.subtitle{
font-size:16px;
margin-bottom:30px;
}

.option{
height:74px;
font-size:22px;
padding:0 18px;
border-radius:18px;
margin-bottom:16px;
}

.option svg{
width:32px;
height:32px;
}
}

</style>
</head>

<body>

<div class="card">

<!-- 🔙 BACK ICON -->
<div class="back-icon" onclick="window.history.back()">
<svg viewBox="0 0 24 24" fill="none">
<path d="M15 18l-6-6 6-6" stroke-width="2"/>
</svg>
</div>

<h2>What are you listing?</h2>
<p class="subtitle">
Tap to select your property type.
</p>

<div class="property-grid">

<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="land">

<button class="property-card">

<img src="/static/images/land.png" alt="Land">

<h3>Sell Land</h3>

</button>

</form>

<form method="POST">
<input type="hidden" name="listingType" value="rent">
<input type="hidden" name="propertyType" value="house">

<button class="property-card">

<img src="/static/images/rent.png" alt="Rent">

<h3>Rent House / Flat</h3>

</button>

</form>


<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="house">

<button class="property-card">

<img src="/static/images/house.png" alt="House">

<h3>Sell House / Flat</h3>

</button>

</form>


<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="commercial">

<button class="property-card">

<img src="/static/images/commercial.png" alt="Commercial">

<h3>Commercial Property</h3>

</button>

</form>


<form method="POST">
<input type="hidden" name="listingType" value="rent">
<input type="hidden" name="propertyType" value="hostel">

<button class="property-card">

<img src="/static/images/hostel.png" alt="Hostel">

<h3>Hostel / PG</h3>

</button>

</form>

</div>










</div>

</body>
</html>
