<!DOCTYPE html>
<html>
<head>
<title>Select Listing Type</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
min-height:100vh;
background:
linear-gradient(rgba(10,15,40,.78),rgba(10,15,40,.90)),
url('https://images.unsplash.com/photo-1507089947368-19c1da9775ae?q=80&w=1920')
center/cover no-repeat;
color:white;
}

.card{
width:100%;
max-width: 480px;
min-height:100vh;
margin: auto;
padding:30px 20px 40px;
box-sizing:border-box;
background:transparent;
position:relative;
}
.back-icon{
position:absolute;
top:25px;
left:18px;
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
cursor:pointer;
}

.back-icon svg{
width:22px;
height:22px;
stroke:white;
}

h2{
margin-top:75px;
margin-bottom:12px;
font-size:52px;
font-weight:800;
line-height: 1.1;
letter-spacing: -1px;
text-shadow: 0 4px 12px rgba(0,0,0,.35);
}

.subtitle{
font-size:18px;
color: rgba(255,255,255,.75);
line-height: 1.6;
margin-bottom:35px;
}

.option{
width:100%;
height:92px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 26px;
margin: bottom 20px;
border-radius:24px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.09);
backdrop-filter:blur(22px);
color:white;
font-size:28px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

.option:hover{
background:rgba(255,255,255,.14);
border-color: #72dfff;
transform:translateY(-3px);
box-shadow: 0 14px 35px rgba(0,0,0,.35);
}

form{ margin:0; }

@media(max-width:600px){

.card{
padding:24px 16px 35px;
}

h2{
font-size:38px;
margin-top:68px;
}

.subtitle{
font-size:16px;
margin-bottom:30px;
}

.option{
height:74px;
font-size:22px;
padding:0 18px;
border-radius:18px;
margin-bottom:16px;
}

.option svg{
width:32px;
height:32px;
}
}

</style>
</head>

<body>

<div class="card">

<!-- 🔙 BACK ICON -->
<div class="back-icon" onclick="window.history.back()">
<svg viewBox="0 0 24 24" fill="none">
<path d="M15 18l-6-6 6-6" stroke-width="2"/>
</svg>
</div>

<h2>What are you listing?</h2>
<p class="subtitle">
Tap to select your property type.
</p>

<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="land">
<button class="option">

<span>Sell Land</span>

<svg width="38"
     height="38"
     viewBox="0 0 24 24"
     fill="none"
     stroke="white"
     stroke-width="2"
     stroke-linecap="round"
     stroke-linejoin="round">

    <path d="M3 19L9 10L13 15L16 12L21 19"/>

    <path d="M2 19H22"/>

    <path d="M9 10L11 7L13 10"/>

</svg>

</button>
</form>

<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="house">
<button class="option">
    <span>Sell House / Flat</span>
 <svg width="38" height="38"
viewBox="0 0 24 24"
fill="none"
stroke="white"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M3 11L12 4L21 11"/>
<path d="M5 10V20H19V10"/>
<path d="M10 20V15H14V20"/>

</svg>
</button>
</form>

<form method="POST">
<input type="hidden" name="listingType" value="rent">
<input type="hidden" name="propertyType" value="house">
<button class="option">
   <span>Rent House / Flat</span> 
<svg width="38" height="38"
viewBox="0 0 24 24"
fill="none"
stroke="white"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M3 11L12 4L21 11"/>
<path d="M5 10V20H19V10"/>
<path d="M10 20V15H14V20"/>

<circle cx="18" cy="17" r="1.5"/>
<path d="M19.5 17H22"/>
<path d="M21 17V18"/>

</svg>
</button>
</form>

<form method="POST">
<input type="hidden" name="listingType" value="rent">
<input type="hidden" name="propertyType" value="hostel">
<button class="option">
   <span>Hostel / PG</span> 
<svg width="38" height="38"
viewBox="0 0 24 24"
fill="none"
stroke="white"
stroke-width="1.8">

<rect x="4" y="3" width="16" height="18"/>
<path d="M8 7h2"/>
<path d="M14 7h2"/>
<path d="M8 11h2"/>
<path d="M14 11h2"/>
<path d="M11 21v-5h2v5"/>

</svg>
</button>
</form>

<form method="POST">
<input type="hidden" name="listingType" value="sale">
<input type="hidden" name="propertyType" value="commercial">
<button class="option">
    <span>Commercial Property</span>
<svg width="38" height="38"
viewBox="0 0 24 24"
fill="none"
stroke="white"
stroke-width="1.8">

<rect x="4" y="8" width="6" height="12"/>
<rect x="12" y="4" width="8" height="16"/>
<path d="M6 12h2"/>
<path d="M14 8h2"/>
<path d="M14 12h2"/>
<path d="M14 16h2"/>

</svg>
</button>
</form>

</div>

</body>
</html>
